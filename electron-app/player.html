<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Player</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #14141d; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; text-align: center; }
        .icon { font-size: 40px; }
        .title { font-size: 16px; font-weight: bold; margin: 10px 0; color: #F8B400; }
        .desc { font-size: 12px; color: #888; margin-bottom: 20px; }
        .btn { background: #F8B400; color: black; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .controls { margin-top: 20px; display: flex; gap: 15px; font-size: 20px; color: #ccc; }
        .controls span { cursor: pointer; }
        .controls span:hover { color: white; }
    </style>
</head>
<body>
    <div class="icon">🎵</div>
    <div class="title">Audio Aggregator</div>
    <div class="desc">Connect Spotify, Apple Music, or YouTube Music.</div>
    <button class="btn">Sign In</button>
    <div class="controls">
        <span>⏮</span>
        <span>⏯</span>
        <span>⏭</span>
    </div>
</body>
</html>
